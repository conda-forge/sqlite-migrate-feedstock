{% set name = "sqlite-migrate" %}
{% set version = "0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: c6b78b5bb486b541a5c484c93a22079ad7fab8c142a26793830748586457b3c8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - sqlite-utils >=4

test:
  imports:
    - sqlite_migrate
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: A simple database migration system for SQLite, based on sqlite-utils
  home: https://github.com/simonw/sqlite-migrate
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
